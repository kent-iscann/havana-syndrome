name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Quartz
        run: git clone https://github.com/jackyzha0/quartz.git quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Copy wiki content into Quartz
        run: |
          rm -rf quartz/content/*
          mkdir -p quartz/content
          cp -r content/entries quartz/content/
          if [ -f "content/index.md" ]; then
            cp content/index.md quartz/content/index.md
          fi

      - name: Copy custom config
        run: cp quartz.config.ts quartz/quartz.config.ts

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm install

      - name: Build Quartz site
        working-directory: quartz
        run: npx quartz build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
